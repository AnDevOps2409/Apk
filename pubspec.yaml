name: dnse_stock_app
description: "Ứng dụng theo dõi chứng khoán DNSE - Real-time price board."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Charts - Candlestick

  # Local Storage (Settings - Gemini API Key)
  shared_preferences: ^2.5.4

  # Firebase (Cloud sync cho Trade Logs, Market Levels, Watchlist)
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  google_sign_in: ^6.2.2

  # HTTP client for FData API server
  http: ^1.6.0

  # Icons & UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1

  # Intl (formatting số, ngày)
  intl: ^0.20.2
  k_chart_plus: ^1.0.3
  webview_flutter: ^4.13.1

  # Trading Journal & AI Coach
  flutter_markdown: ^0.7.3

  # File picker — dùng để import JSON bảng phân tích hàng ngày
  file_picker: ^8.1.2

  # In-app update checker
  package_info_plus: ^8.0.0
  path_provider: ^2.1.4
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.2
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.2
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/chart.html
    - assets/tv.js

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
