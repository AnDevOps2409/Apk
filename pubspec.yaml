name: dnse_stock_app
description: "Ứng dụng theo dõi chứng khoán DNSE - Real-time price board."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Charts - Candlestick
  candlesticks: ^2.1.0

  # Local Storage (Watchlist)
  shared_preferences: ^2.3.3

  # Icons & UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1

  # Intl (formatting số, ngày)
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.2
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
